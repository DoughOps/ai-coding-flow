<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jobs — AI Coding Flow</title>
<style>
  :root, [data-theme="light"] {
    --bg: #ffffff;
    --surface: #f6f8fa;
    --border: #d0d7de;
    --text: #1f2328;
    --text-muted: #636c76;
    --accent: #0969da;
    --accent-fg: #ffffff;
    --badge-queued-bg: #ddf4ff;
    --badge-queued-fg: #0550ae;
    --badge-processing-bg: #fff8c5;
    --badge-processing-fg: #7d4e00;
    --badge-reworking-bg: #fff8c5;
    --badge-reworking-fg: #7d4e00;
    --badge-done-bg: #dafbe1;
    --badge-done-fg: #116329;
    --badge-failed-bg: #ffebe9;
    --badge-failed-fg: #82071e;
    --badge-needs-clarification-bg: #fff1e5;
    --badge-needs-clarification-fg: #953800;
  }
  [data-theme="dark"] {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8d96a0;
    --accent: #58a6ff;
    --accent-fg: #0d1117;
    --badge-queued-bg: #033d8b;
    --badge-queued-fg: #cae8ff;
    --badge-processing-bg: #4d2d00;
    --badge-processing-fg: #fae17d;
    --badge-reworking-bg: #4d2d00;
    --badge-reworking-fg: #fae17d;
    --badge-done-bg: #033a16;
    --badge-done-fg: #aff5b4;
    --badge-failed-bg: #4b1113;
    --badge-failed-fg: #ffa198;
    --badge-needs-clarification-bg: #4e2400;
    --badge-needs-clarification-fg: #ffc680;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; }
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; align-items: center; gap: 16px; }
  header a { color: var(--accent); text-decoration: none; font-size: 13px; }
  header a:hover { text-decoration: underline; }
  header h1 { flex: 1; font-size: 16px; font-weight: 600; }
  .theme-btn { background: none; border: 1px solid var(--border); border-radius: 6px; padding: 4px 10px; cursor: pointer; color: var(--text); font-size: 13px; }
  main { max-width: 1100px; margin: 0 auto; padding: 24px; }
  .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .toolbar span { color: var(--text-muted); font-size: 13px; }
  .refresh-btn { background: var(--accent); color: var(--accent-fg); border: none; border-radius: 6px; padding: 6px 14px; cursor: pointer; font-size: 13px; }
  table { width: 100%; border-collapse: collapse; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  th { background: var(--surface); color: var(--text-muted); font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: .5px; padding: 10px 16px; text-align: left; border-bottom: 1px solid var(--border); }
  td { padding: 12px 16px; border-bottom: 1px solid var(--border); vertical-align: top; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: color-mix(in srgb, var(--accent) 4%, transparent); }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 12px; font-weight: 600; white-space: nowrap; }
  .badge-queued              { background: var(--badge-queued-bg);              color: var(--badge-queued-fg); }
  .badge-processing          { background: var(--badge-processing-bg);          color: var(--badge-processing-fg); }
  .badge-reworking           { background: var(--badge-reworking-bg);           color: var(--badge-reworking-fg); }
  .badge-done                { background: var(--badge-done-bg);                color: var(--badge-done-fg); }
  .badge-failed              { background: var(--badge-failed-bg);              color: var(--badge-failed-fg); }
  .badge-needs_clarification { background: var(--badge-needs-clarification-bg); color: var(--badge-needs-clarification-fg); }
  .issue-title { font-weight: 500; }
  .issue-num { color: var(--text-muted); font-size: 12px; }
  a.pr-link { color: var(--accent); text-decoration: none; font-size: 12px; }
  a.pr-link:hover { text-decoration: underline; }
  .empty { text-align: center; padding: 48px; color: var(--text-muted); }
  dialog { border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); padding: 24px; width: 340px; }
  dialog::backdrop { background: rgba(0,0,0,.5); }
  dialog h2 { margin-bottom: 8px; font-size: 15px; }
  dialog p { color: var(--text-muted); font-size: 13px; margin-bottom: 16px; }
  dialog input { width: 100%; border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; background: var(--surface); color: var(--text); font-size: 14px; margin-bottom: 12px; }
  dialog .actions { display: flex; gap: 8px; justify-content: flex-end; }
  dialog button { padding: 6px 14px; border-radius: 6px; font-size: 13px; cursor: pointer; }
  .btn-primary { background: var(--accent); color: var(--accent-fg); border: none; }
  .btn-secondary { background: none; border: 1px solid var(--border); color: var(--text); }
  .stats-bar { display: flex; gap: 16px; font-size: 13px; color: var(--text-muted); margin-bottom: 12px; }
  .stats-bar strong { color: var(--text); }
  .status-line { color: var(--text-muted); font-size: 13px; }
  .repo-cell { font-size: 12px; color: var(--text-muted); max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  tr.job-row { cursor: pointer; }
  .filter-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
  .filter-tabs { display: flex; gap: 4px; }
  .filter-tab { background: none; border: 1px solid var(--border); border-radius: 20px; padding: 3px 12px; cursor: pointer; color: var(--text-muted); font-size: 12px; font-weight: 500; }
  .filter-tab:hover { border-color: var(--accent); color: var(--accent); }
  .filter-tab.active { background: var(--accent); color: var(--accent-fg); border-color: var(--accent); }
  .search-input { border: 1px solid var(--border); border-radius: 6px; padding: 4px 10px; background: var(--surface); color: var(--text); font-size: 13px; width: 200px; }
  .search-input:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
  .load-more-wrap { text-align: center; margin-top: 16px; }
  .load-more-btn { background: none; border: 1px solid var(--border); border-radius: 6px; padding: 6px 20px; cursor: pointer; color: var(--text); font-size: 13px; }
  .load-more-btn:hover { border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>
<header>
  <a href="/guide">← Guide</a>
  <h1>Jobs</h1>
  <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">🌙</button>
</header>
<main>
  <div id="statsBar" class="stats-bar"></div>
  <div class="filter-row">
    <div class="filter-tabs">
      <button class="filter-tab active" onclick="setFilter('')">All</button>
      <button class="filter-tab" onclick="setFilter('queued')">Queued</button>
      <button class="filter-tab" onclick="setFilter('processing')">Processing</button>
      <button class="filter-tab" onclick="setFilter('reworking')">Reworking</button>
      <button class="filter-tab" onclick="setFilter('needs_clarification')">Needs Clarification</button>
      <button class="filter-tab" onclick="setFilter('done')">Done</button>
      <button class="filter-tab" onclick="setFilter('failed')">Failed</button>
    </div>
    <input class="search-input" id="searchInput" type="search" placeholder="Search issues or repos…" oninput="setSearch(this.value)">
    <span style="flex:1"></span>
    <span id="statusLine" class="status-line">Loading…</span>
    <button class="refresh-btn" onclick="loadJobs()">Refresh</button>
  </div>
  <div id="tableWrap"></div>
  <div class="load-more-wrap" id="paginationWrap" style="display:none">
    <button class="load-more-btn" onclick="loadMore()">Load more</button>
  </div>
</main>

<dialog id="authDialog">
  <h2>Admin password required</h2>
  <p>Enter the <code>ADMIN_PASSWORD</code> to view job history.</p>
  <input type="password" id="pwInput" placeholder="Password" autocomplete="current-password">
  <div class="actions">
    <button class="btn-primary" onclick="submitPassword()">Sign in</button>
  </div>
</dialog>

<script>
  // ── theme ─────────────────────────────────────────────────────────────────
  function applyTheme(t) {
    document.documentElement.dataset.theme = t;
    document.getElementById('themeBtn').textContent = t === 'dark' ? '☀️' : '🌙';
    localStorage.setItem('theme', t);
  }
  function toggleTheme() {
    applyTheme(document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark');
  }
  (function () {
    const saved = localStorage.getItem('theme');
    const sys = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    applyTheme(saved || sys);
  })();

  // ── auth ──────────────────────────────────────────────────────────────────
  function getToken() { return sessionStorage.getItem('adminToken') || ''; }
  function submitPassword() {
    const pw = document.getElementById('pwInput').value;
    if (!pw) return;
    sessionStorage.setItem('adminToken', pw);
    document.getElementById('authDialog').close();
    document.getElementById('pwInput').value = '';
    loadJobs();
  }
  document.getElementById('pwInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') submitPassword();
  });

  // ── state ─────────────────────────────────────────────────────────────────
  const PAGE_SIZE = 50;
  let allJobs = [];
  let currentOffset = 0;
  let activeStatus = '';
  let searchQuery  = '';

  // ── helpers ───────────────────────────────────────────────────────────────
  function formatDate(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    return d.toLocaleString(undefined, { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
  }

  function _repoSlug(url) {
    try { return new URL(url).pathname.replace(/^\//, '').replace(/\.git$/, ''); }
    catch { return url || '—'; }
  }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function _filtered() {
    return allJobs.filter(j => {
      if (activeStatus && j.status !== activeStatus) return false;
      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        const inTitle = j.issue_title.toLowerCase().includes(q);
        const inRepo  = _repoSlug(j.repo_url).toLowerCase().includes(q);
        if (!inTitle && !inRepo) return false;
      }
      return true;
    });
  }

  function setFilter(status) {
    activeStatus = status;
    document.querySelectorAll('.filter-tab').forEach(b => {
      b.classList.toggle('active', b.textContent.toLowerCase() === (status || 'all'));
    });
    renderTable(_filtered());
  }

  function setSearch(val) {
    searchQuery = val.trim();
    renderTable(_filtered());
  }

  // ── render ────────────────────────────────────────────────────────────────
  function renderStats() {
    const running = allJobs.filter(j => j.status === 'processing' || j.status === 'reworking').length;
    const done    = allJobs.filter(j => j.status === 'done').length;
    const failed  = allJobs.filter(j => j.status === 'failed').length;
    document.getElementById('statsBar').innerHTML =
      `Total: <strong>${allJobs.length}</strong> &nbsp;·&nbsp; ` +
      `Running: <strong>${running}</strong> &nbsp;·&nbsp; ` +
      `Done: <strong>${done}</strong> &nbsp;·&nbsp; ` +
      `Failed: <strong>${failed}</strong>`;
  }

  function renderTable(jobs) {
    const wrap = document.getElementById('tableWrap');
    if (!jobs.length) {
      wrap.innerHTML = '<div class="empty">No jobs yet.</div>';
      return;
    }
    const rows = jobs.map(j => `
      <tr class="job-row" onclick="openModal(${j.id})">
        <td><span class="badge badge-${escHtml(j.status)}">${escHtml(j.status.replace(/_/g,' '))}</span></td>
        <td>
          <div class="issue-title">${escHtml(j.issue_title)}</div>
          <div class="issue-num">${escHtml(j.platform)} #${j.issue_number}</div>
        </td>
        <td class="repo-cell">${escHtml(_repoSlug(j.repo_url))}</td>
        <td>${j.engine ? escHtml(j.engine) : '—'}</td>
        <td>${formatDate(j.created_at)}</td>
        <td>${j.pr_url ? `<a class="pr-link" href="${escHtml(j.pr_url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">PR ↗</a>` : '—'}</td>
      </tr>`).join('');
    wrap.innerHTML = `
      <table>
        <thead><tr><th>Status</th><th>Issue</th><th>Repo</th><th>Engine</th><th>Created</th><th>PR</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  function openModal(_id) { /* implemented in Task 5 */ }

  function renderPagination(hasMore) {
    document.getElementById('paginationWrap').style.display = hasMore ? 'block' : 'none';
  }

  async function loadJobs() {
    const statusLine = document.getElementById('statusLine');
    statusLine.textContent = 'Loading…';
    allJobs = [];
    currentOffset = 0;
    try {
      const resp = await fetch(`/api/jobs?limit=${PAGE_SIZE}&offset=0`, {
        headers: getToken() ? { 'X-Admin-Token': getToken() } : {},
      });
      if (resp.status === 401) {
        sessionStorage.removeItem('adminToken');
        document.getElementById('authDialog').showModal();
        statusLine.textContent = 'Authentication required.';
        return;
      }
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const jobs = await resp.json();
      allJobs = jobs;
      currentOffset = jobs.length;
      renderStats();
      renderTable(_filtered());
      renderPagination(jobs.length === PAGE_SIZE);
      statusLine.textContent = `${jobs.length} job${jobs.length !== 1 ? 's' : ''} · refreshed ${new Date().toLocaleTimeString()}`;
    } catch (err) {
      statusLine.textContent = `Error: ${err.message}`;
    }
  }

  // ── load more ─────────────────────────────────────────────────────────────
  async function loadMore() {
    try {
      const resp = await fetch(`/api/jobs?limit=${PAGE_SIZE}&offset=${currentOffset}`, {
        headers: getToken() ? { 'X-Admin-Token': getToken() } : {},
      });
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const jobs = await resp.json();
      allJobs = allJobs.concat(jobs);
      currentOffset += jobs.length;
      renderStats();
      renderTable(_filtered());
      renderPagination(jobs.length === PAGE_SIZE);
      document.getElementById('statusLine').textContent =
        `${allJobs.length} job${allJobs.length !== 1 ? 's' : ''} loaded`;
    } catch (err) {
      document.getElementById('statusLine').textContent = `Error: ${err.message}`;
    }
  }

  // ── boot ──────────────────────────────────────────────────────────────────
  loadJobs();
  setInterval(loadJobs, 30000);
</script>
</body>
</html>
